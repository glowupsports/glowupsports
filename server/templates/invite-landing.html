<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{INVITER_NAME}} invited you to play — Glow Up Sports</title>
    <meta property="og:title" content="{{INVITER_NAME}} invited you to play tennis" />
    <meta property="og:description" content="Join Glow Up Sports and accept the invite." />
    <meta property="og:image" content="{{INVITER_PHOTO}}" />
    <meta name="theme-color" content="#0B0E11" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
        background: #0b0e11;
        color: #f5f5f5;
        min-height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 20px 48px;
      }
      .wrap {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .brand {
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8b9298;
        margin-bottom: 4px;
      }
      .card {
        width: 100%;
        background: linear-gradient(160deg, #161b21 0%, #10141a 100%);
        border: 1px solid #1d2530;
        border-radius: 24px;
        padding: 28px 24px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.6);
      }
      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: #1d2530 center/cover no-repeat;
        border: 2px solid #2c3744;
        overflow: hidden;
      }
      .avatar.placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: #4f5965;
      }
      h1 {
        font-size: 22px;
        line-height: 1.2;
        margin: 6px 0 0;
        font-weight: 700;
      }
      .level {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        font-size: 12px;
        color: #c9ff5b;
        background: rgba(201, 255, 91, 0.08);
        border: 1px solid rgba(201, 255, 91, 0.25);
        padding: 4px 10px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      .city {
        font-size: 13px;
        color: #8b9298;
      }
      .message {
        font-size: 15px;
        color: #d6dadf;
        line-height: 1.45;
        margin-top: 8px;
      }
      .cta {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.15s ease;
        border: none;
        cursor: pointer;
      }
      .btn:active {
        opacity: 0.7;
      }
      .btn-primary {
        background: #c9ff5b;
        color: #0b0e11;
      }
      .btn-secondary {
        background: #1d2530;
        color: #f5f5f5;
        border: 1px solid #2c3744;
      }
      .stores {
        display: flex;
        gap: 10px;
        margin-top: 6px;
      }
      .stores .btn {
        flex: 1;
        height: 52px;
        font-size: 14px;
      }
      .footer {
        font-size: 12px;
        color: #545b63;
        text-align: center;
        line-height: 1.5;
        max-width: 320px;
        margin-top: 8px;
      }
      .footer a {
        color: #8b9298;
      }
      .state-banner {
        width: 100%;
        background: #2a1414;
        border: 1px solid #5a2424;
        color: #ffb1b1;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        text-align: center;
      }
      .invalid .card {
        opacity: 0.5;
      }
    </style>
  </head>
  <body class="{{STATUS_CLASS}}">
    <div class="wrap">
      <div class="brand">Glow Up Sports</div>
      {{STATE_BANNER}}
      <div class="card">
        <div class="avatar" style="background-image: url('{{INVITER_PHOTO}}');"></div>
        <h1>{{INVITER_NAME}} wants to play</h1>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;">
          <span class="level">{{INVITER_LEVEL}}</span>
          <span class="city">{{INVITER_CITY}}</span>
        </div>
        <p class="message">{{MESSAGE}}</p>
        <div class="cta">
          <a class="btn btn-primary" href="{{DEEP_LINK}}">Open in app</a>
          <div class="stores">
            <a class="btn btn-secondary" href="{{APP_STORE_URL}}">App Store</a>
            <a class="btn btn-secondary" href="{{PLAY_STORE_URL}}">Google Play</a>
          </div>
        </div>
      </div>
      <p class="footer">
        New to Glow Up Sports? Install the app, sign up, and your invite will be
        waiting for you. Already installed? Tap "Open in app".
      </p>
    </div>
    <script>
      // If the user has the app installed, the deep link will open it
      // immediately; otherwise the click silently fails and they can hit a
      // store link below. We try the deep link automatically once on load on
      // mobile so the journey feels seamless.
      (function () {
        try {
          var ua = navigator.userAgent || "";
          var isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
          if (!isMobile) return;
          var t = setTimeout(function () {
            // No-op: we leave the manual store buttons visible.
          }, 1500);
          window.location.href = "{{DEEP_LINK}}";
          window.addEventListener("pagehide", function () {
            clearTimeout(t);
          });
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </body>
</html>
