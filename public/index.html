<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <style id="icon-fonts">
      @font-face {
        font-family: "Ionicons";
        src: url("/fonts/Ionicons.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Feather";
        src: url("/fonts/Feather.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Material Icons";
        src: url("/fonts/MaterialIcons.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "anticon";
        src: url("/fonts/AntDesign.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "FontAwesome";
        src: url("/fonts/FontAwesome.ttf") format("truetype");
        font-weight: normal;

      @font-face {
        font-family: "Entypo";
        src: url("/fonts/Entypo.ttf") format("truetype");
        font-weight: normal;

      @font-face {
        font-family: "Material Design Icons";
        src: url("/fonts/MaterialCommunityIcons.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "FontAwesome5Free-Regular";
        src: url("/fonts/FontAwesome5_Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "FontAwesome5Free-Solid";
        src: url("/fonts/FontAwesome5_Solid.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "FontAwesome5Brands-Regular";
        src: url("/fonts/FontAwesome5_Brands.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <script>
      // Patch document.fonts.load so that fontfaceobserver can detect icon fonts.
      // Icon fonts only contain glyphs in the Private Use Area (PUA), e.g. U+F100.
      // fontfaceobserver tests with ASCII text ('BESbswy') which does not exist in
      // icon fonts, so the load check always fails and icons render as squares.
      // This patch replaces the test text with a PUA character (U+F100) when an
      // icon font is detected, so document.fonts.load returns the correct result.
      (function () {
        var ICON_FONT_KEYWORDS = [
          'feather',
          'ionicons',
          'material',
          'antdesign',
          'fontawesome',
          'entypo',
          'octicons',
          'zocial',
          'simpleline',
          'evilicons',
          'foundation',
        ];
        var PUA_TEST_CHAR = '\uF100';

        if (typeof document !== 'undefined' && document.fonts && document.fonts.load) {
          var _originalLoad = document.fonts.load.bind(document.fonts);
          document.fonts.load = function (font, text) {
            var fontLower = (font || '').toLowerCase();
            var isIconFont = ICON_FONT_KEYWORDS.some(function (kw) {
              return fontLower.indexOf(kw) !== -1;
            });
            if (isIconFont) {
              text = PUA_TEST_CHAR;
            }
            return _originalLoad(font, text);
          };
        }
      })();
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
